<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" preserveAspectRatio="xMidYMid slice">
  <!-- Circuit Pattern Background - Repeating tile -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    
    <pattern id="circuitPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="transparent"/>
      <!-- Circuit lines -->
      <g stroke="#00d4ff" stroke-width="0.5" opacity="0.2">
        <!-- Horizontal -->
        <line x1="0" y1="10" x2="40" y2="10"/>
        <line x1="0" y1="30" x2="40" y2="30"/>
        <!-- Vertical -->
        <line x1="10" y1="0" x2="10" y2="20"/>
        <line x1="30" y1="20" x2="30" y2="40"/>
        <!-- Nodes -->
        <circle cx="10" cy="10" r="1" fill="#00d4ff"/>
        <circle cx="30" cy="30" r="1" fill="#00d4ff"/>
        <circle cx="10" cy="30" r="1" fill="#7b2cbf"/>
        <circle cx="30" cy="10" r="1" fill="#ff006e"/>
      </g>
    </pattern>
    
    <!-- Glow filter -->
    <filter id="circuitGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGrad)"/>
  
  <!-- Circuit Pattern Overlay -->
  <rect width="400" height="300" fill="url(#circuitPattern)"/>
  
  <!-- Decorative Data Flow Lines -->
  <g stroke-width="1" fill="none" opacity="0.4">
    <!-- Animated flow lines -->
    <path d="M 0 50 Q 100 45, 200 50 T 400 50" stroke="#00d4ff" stroke-dasharray="8,4">
      <animate attributeName="stroke-dashoffset" from="0" to="24" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 0 150 Q 100 155, 200 150 T 400 150" stroke="#7b2cbf" stroke-dasharray="8,4">
      <animate attributeName="stroke-dashoffset" from="0" to="24" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M 0 250 Q 100 245, 200 250 T 400 250" stroke="#ff006e" stroke-dasharray="8,4">
      <animate attributeName="stroke-dashoffset" from="0" to="24" dur="1.8s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Floating circuit nodes -->
  <g filter="url(#circuitGlow)">
    <!-- Row 1 -->
    <circle cx="50" cy="60" r="3" fill="#00d4ff" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="55" r="2" fill="#7b2cbf" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="250" cy="65" r="3" fill="#00d4ff" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="350" cy="58" r="2" fill="#ff006e" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.8s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
    
    <!-- Row 2 -->
    <circle cx="80" cy="160" r="2" fill="#7b2cbf" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.2s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle cx="180" cy="155" r="3" fill="#00d4ff" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3.2s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
    <circle cx="280" cy="162" r="2" fill="#ff006e" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.7s" repeatCount="indefinite" begin="1.3s"/>
    </circle>
    <circle cx="380" cy="158" r="3" fill="#7b2cbf" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.4s" repeatCount="indefinite" begin="1.8s"/>
    </circle>
    
    <!-- Row 3 -->
    <circle cx="60" cy="260" r="3" fill="#ff006e" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.6s" repeatCount="indefinite" begin="0.2s"/>
    </circle>
    <circle cx="160" cy="255" r="2" fill="#00d4ff" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite" begin="0.7s"/>
    </circle>
    <circle cx="260" cy="262" r="3" fill="#7b2cbf" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.3s" repeatCount="indefinite" begin="1.2s"/>
    </circle>
    <circle cx="360" cy="258" r="2" fill="#00d4ff" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.9s" repeatCount="indefinite" begin="1.7s"/>
    </circle>
  </g>
  
  <!-- Corner decorations -->
  <g stroke="#00d4ff" stroke-width="0.5" opacity="0.3">
    <!-- Top left -->
    <path d="M 10 10 L 10 40 L 40 40"/>
    <circle cx="10" cy="10" r="1.5"/>
    <!-- Top right -->
    <path d="M 390 10 L 390 40 L 360 40"/>
    <circle cx="390" cy="10" r="1.5"/>
    <!-- Bottom left -->
    <path d="M 10 290 L 10 260 L 40 260"/>
    <circle cx="10" cy="290" r="1.5"/>
    <!-- Bottom right -->
    <path d="M 390 290 L 390 260 L 360 260"/>
    <circle cx="390" cy="290" r="1.5"/>
  </g>
</svg>
