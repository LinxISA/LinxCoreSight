<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="lcsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d9ff" />
      <stop offset="100%" stop-color="#00ff88" />
    </linearGradient>
    <filter id="lcsGlow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="4" y="4" width="56" height="56" rx="14" fill="#0a0e14" stroke="url(#lcsGrad)" stroke-width="2"/>

  <!-- CoreSight eye -->
  <g filter="url(#lcsGlow)" fill="none" stroke="url(#lcsGrad)" stroke-width="2">
    <path d="M12 32 C18 22, 26 18, 32 18 C38 18, 46 22, 52 32 C46 42, 38 46, 32 46 C26 46, 18 42, 12 32 Z"/>
  </g>
  <circle cx="32" cy="32" r="7" fill="#0a0e14" stroke="url(#lcsGrad)" stroke-width="2"/>
  <circle cx="32" cy="32" r="3.2" fill="#00d9ff"/>

  <!-- Circuit taps -->
  <g stroke="#8b949e" stroke-width="1.4" stroke-linecap="round">
    <line x1="32" y1="12" x2="32" y2="18"/>
    <line x1="32" y1="46" x2="32" y2="52"/>
    <line x1="10" y1="32" x2="12" y2="32"/>
    <line x1="52" y1="32" x2="54" y2="32"/>
  </g>
  <g fill="#00ff88">
    <circle cx="32" cy="12" r="2"/>
    <circle cx="32" cy="52" r="2"/>
    <circle cx="10" cy="32" r="2"/>
    <circle cx="54" cy="32" r="2"/>
  </g>
</svg>
